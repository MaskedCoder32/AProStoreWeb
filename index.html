<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APro Store | Premium Digital Goods</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="flex flex-col min-h-screen">

  <div class="bg-grid"></div>
  <div class="glow-orb"></div>
  <div id="particles-container"></div>

  <!-- Persistent Header -->
  <header id="navbar" class="fixed top-0 left-0 w-full z-50 py-5 border-b border-transparent transition-all duration-300 bg-[#030712]/50 backdrop-blur-md">
    <div class="w-full max-w-[1100px] mx-auto px-5 sm:px-8 flex justify-between items-center">
      <a href="/" class="text-[28px] tracking-tight font-wide transition-transform hover:scale-105 shrink-0">
        <span class="text-white font-bold">APro</span><span class="text-emerald-500 font-bold">Store</span>
      </a>
      <button onclick="toggleMenu()" class="text-gray-300 hover:text-white transition-colors p-2 bg-white/5 hover:bg-white/10 rounded-xl border border-white/5 backdrop-blur-sm cursor-pointer shrink-0">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"></path></svg>
      </button>
    </div>
  </header>

  <!-- Drawer Menu -->
  <div id="menu-backdrop" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] opacity-0 pointer-events-none transition-opacity duration-400" onclick="toggleMenu()"></div>
  <nav id="side-menu" class="fixed top-0 right-0 h-full w-[85vw] sm:w-[400px] bg-[#050914]/95 backdrop-blur-3xl border-l border-white/10 z-[70] transform translate-x-full transition-transform duration-500 ease-in-out flex flex-col p-6 sm:p-8 shadow-[0_0_50px_rgba(0,0,0,0.8)]">
    <div class="flex justify-between items-center mb-8 mt-2">
      <div class="text-[24px] font-wide"><span class="text-white font-bold">Menu</span></div>
      <button onclick="toggleMenu()" class="text-gray-400 hover:text-white p-2 bg-white/5 rounded-xl hover:bg-white/10 border border-white/5 transition-all cursor-pointer">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="flex flex-col gap-2 text-[17px] font-medium">
      <a href="/" class="nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all border-l-3 border-transparent">Home</a>
      <a href="/about" class="nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all border-l-3 border-transparent">About Us</a>
      <a href="/terms" class="nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all border-l-3 border-transparent">Terms & Conditions</a>
      <a href="/privacy" class="nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all border-l-3 border-transparent">Privacy Policy</a>
      <a href="/refund" class="nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all border-l-3 border-transparent">Refund Policy</a>
      <a href="/contact" class="nav-link flex items-center gap-4 px-5 py-3.5 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all border-l-3 border-transparent">Contact Us</a>
    </div>
    <div class="mt-auto pt-6 pb-4">
      <a href="https://t.me/AProStoreBot" target="_blank" class="w-full flex items-center justify-center gap-2 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all">
        Open Bot 🚀
      </a>
    </div>
  </nav>

  <main class="relative z-10 w-full max-w-[1100px] px-5 sm:px-8 mx-auto flex-1 flex flex-col items-center pt-36 sm:pt-44 text-center">
    <div class="reveal flex items-center justify-center gap-3 px-5 py-2 rounded-full border border-emerald-500/20 bg-emerald-900/10 backdrop-blur-sm mb-6 sm:mb-8 shadow-[0_0_15px_rgba(16,185,129,0.1)]">
      <div class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,1)] animate-pulse"></div>
      <span class="text-[10px] sm:text-xs text-emerald-300 font-semibold tracking-widest uppercase">Trusted Digital Marketplace</span>
    </div>
    
    <!-- FIXED TYPOGRAPHY ALIGNMENT -->
    <h1 class="font-wide text-5xl sm:text-[80px] md:text-[100px] leading-[1.1] text-white w-full tracking-tight text-center">
      <span class="reveal block">Premium</span>
      <span class="reveal block">Digital Goods</span>
      <span class="reveal block text-grad-green mt-1

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | APro Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="relative overflow-x-hidden min-h-screen flex flex-col items-center">
  <div class="bg-grid"></div>
  <div class="glow-orb"></div>
  <div id="particles-container"></div>
  
  <!-- COPY <header id="navbar"> AND <nav id="side-menu"> FROM INDEX.HTML HERE -->

  <main class="relative z-10 w-full max-w-[650px] px-5 mx-auto pt-44 pb-20 text-center">
    <h1 class="font-wide text-5xl md:text-6xl text-white mb-4">Contact Support</h1>
    <p class="text-gray-400 mb-12 text-lg">Have a question or facing an issue? We're here to help you immediately.</p>

    <div class="reveal feature-card p-12 flex flex-col items-center gap-6 shadow-[0_0_30px_rgba(0,0,0,0.5)]">
      <div class="w-20 h-20 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.15)]">
        <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
      </div>
      
      <h3 class="text-3xl font-bold text-white font-wide mt-2">Directly Chat with Us</h3>
      <p class="text-gray-400 text-[17px] max-w-md mx-auto leading-relaxed">
        The fastest way to reach us is by directly chatting with our official support bot on Telegram. We usually reply within minutes!
      </p>
      
      <a href="https://t.me/AProSupport_Bot" target="_blank" class="mt-6 w-full sm:w-auto px-10 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg shadow-[0_0_20px_rgba(16,185,129,0.4)] hover:shadow-[0_0_30px_rgba(16,185,129,0.6)] transition-all transform hover:-translate-y-1 flex justify-center items-center gap-3">
        <span>Chat Now</span>
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
      </a>
    </div>
  </main>
  
  <script src="js/app.js"></script>
</body>
</html>

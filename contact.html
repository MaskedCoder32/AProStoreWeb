<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | APro Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="relative overflow-x-hidden min-h-screen flex flex-col items-center">
  <div class="bg-grid"></div>
  <div id="particles-container"></div>
  
  <!-- COPY NAVBAR & DRAWER FROM INDEX.HTML HERE -->

  <main class="relative z-10 w-full max-w-[600px] px-5 mx-auto pt-40 pb-20 text-center">
    <h1 class="font-wide text-5xl text-white mb-4">Contact Us</h1>
    <p class="text-[#888891] mb-10 text-lg">Have a question or need support? We're here to help.</p>

    <div class="reveal feature-card p-10 flex flex-col items-center gap-6">
      <div class="w-16 h-16 rounded-full bg-emerald-500/20 flex items-center justify-center">
        <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>

      <h3 class="text-2xl font-bold text-white font-wide">Telegram Support</h3>
      <p class="text-[#888891]">The fastest way to reach us is directly through our official Telegram Bot support system.</p>
      <a href="https://t.me/AProStoreBot" target="_blank" class="mt-2 px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-full font-bold shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all">
        Open Support Ticket
      </a>
    </div>
  </main>
  <script src="js/app.js"></script>
